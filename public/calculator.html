<html lang="en">

  <head>

    <link

      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"

      rel="stylesheet"

      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"

      crossorigin="anonymous"

    />



    <script

      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"

      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"

      crossorigin="anonymous"

    ></script>

    <title>Calculator Example</title>

  </head>

  <body>

    <div class="container">

      

        <div class="form-group">

          <label for="numberOneInput">NumberOne</label>

          <input type="number" class="form-control" id="numberOneInput" aria-describedby="numberOne" placeholder="Enter number One"/>

        </div>

        <div class="form-group">

          <label for="numberTwoInput">NumberTwo</label>

          <input type="number" class="form-control" id="numberTwoInput" placeholder="Enter number Two"/>

        </div> 

        <!-- Button  -->
        <button type="submit" onclick="addrequest()" class="btn btn-primary">Add</button> <!-- + -->
        <button type="submit" onclick="multiplyrequest()" class="btn btn-primary">Multiply</button> <!-- * -->
        <button type="submit" onclick="subtractrequest()" class="btn btn-primary">Subtract</button> <!-- - -->
        <button type="submit" onclick="dividerequest()" class="btn btn-primary">Divide</button> <!-- / -->

    </div>

    <div>

      Result

      <span id="result"></span>

    </div>

  </body>

  <script>

    let num1 = 4;
    let num2 = 2;

    const addrequest = () => {

        let num1 = document.getElementById("numberOneInput").value;
        let num2 = document.getElementById("numberTwoInput").value;
        let operation = "/add"

        console.log("ADD Operation ==> num1: ",num1, ", num2: ", num2)
        
      fetch(`/calculator/${operation}?num1=${num1}&num2=${num2}`)
      .then((response) => response.json())
      .then((data) => {
        document.getElementById("result").innerHTML = data.result;
      });  
    }

    const multiplyrequest = () => {

        let num1 = document.getElementById("numberOneInput").value;
        let num2 = document.getElementById("numberTwoInput").value;
        let operation = "/multiply"

        console.log("Multiply Operation ==> num1: ",num1, ", num2: ", num2)

        fetch(`/calculator/${operation}?num1=${num1}&num2=${num2}`)
        .then((response) => response.json())
        .then((data) => {
        document.getElementById("result").innerHTML = data.result;
        });  
    }
    
    const subtractrequest = () => {

      let num1 = document.getElementById("numberOneInput").value;
      let num2 = document.getElementById("numberTwoInput").value;
      let operation = "/subtract"

      console.log("Subtract Operation ==> num1: ",num1, ", num2: ", num2)

      fetch(`/calculator/${operation}?num1=${num1}&num2=${num2}`)
      .then((response) => response.json())
      .then((data) => {
      document.getElementById("result").innerHTML = data.result;
      });  
    }

    const dividerequest = () => {

      let num1 = document.getElementById("numberOneInput").value;
      let num2 = document.getElementById("numberTwoInput").value;
      let operation = "/divide"

      console.log("Subtract Operation ==> num1: ",num1, ", num2: ", num2)

      fetch(`/calculator/${operation}?num1=${num1}&num2=${num2}`)
      .then((response) => response.json())
      .then((data) => {
      document.getElementById("result").innerHTML = data.result;
      });  
    }

  </script>

</html>
